<div class="container mt-3 align-items-center">

  <!-- Top Row -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Employee List</h4>

    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
      Add Employee
    </button>
  </div>

  <!-- Search Row -->
  <div class="row justify-content-center mb-3">

    <div class="col-md-5 align-items-center">
      <input type="text" id="searchName" placeholder="Search by Name" class="form-control">
    </div>

    <div class="col-md-4 align-items-center" >
      <select id="searchDept" class="form-control">
        <option value="">All Departments</option>
        <option>Sales</option>
        <option>Marketing</option>
        <option>HR</option>
        <option>IT</option>
      </select>
    </div>

  </div>

</div>


<!-- ✅ Modal (Fixed Properly) -->
<div class="modal fade" id="addEmployeeModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>Add Employee</h5>

      <input type="text" id="empName" placeholder="Enter Name" class="form-control mb-2">

      <select id="empDept" class="form-control mb-2">
        <option value="">Select Department</option>
        <option>Sales</option>
        <option>Marketing</option>
        <option>HR</option>
        <option>IT</option>
      </select>

      <input type="number" id="empClients" placeholder="No. of Clients" class="form-control mb-2">

      <button class="btn btn-primary" id="saveEmployee">Save</button>

    </div>
  </div>
</div>
